[main]
num_threads = 12
dt_pde = 0.01
simulation_time = 500.0
abort_on_no_activity = false
use_adaptivity = false

[update_monodomain]
main_function=update_monodomain_default

[save_result]
print_rate=100
output_dir=./outputs/cube_endo
main_function=save_as_ensight
binary=false

[assembly_matrix]
init_function=set_initial_conditions_fvm
healthy_sigma_l=0.000260
healthy_sigma_t=0.000105
healthy_sigma_n=0.000160
library_file=shared_libs/libdefault_matrix_assembly.so
main_function=custom_mesh_with_scar_coupling_assembly_matrix

[linear_system_solver]
tolerance=1e-12
use_preconditioner=no
max_iterations=200
library_file=shared_libs/libdefault_linear_system_solver.so
use_gpu=false
main_function=conjugate_gradient
init_function=init_conjugate_gradient

[domain]
name = Cube Mesh
start_discretization = 300.0
maximum_discretization = 300.0
number_of_points = 1
main_function=initialize_model_with_custom_mesh_with_scar
mesh_file=./meshes/cube_endo.alg

[ode_solver]
dt=0.01
use_gpu=false
gpu_id=0
adaptive=false
abstol=1e-12
library_file=shared_libs/libToRORd_withScar.so

